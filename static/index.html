<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sai Clinic - Dr. Vinod (BHMS & Ayurvedic)</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #d9fdd3;
    margin: 0;
}
#chat-container {
    display: flex;
    flex-direction: column;
    max-width: 500px;
    height: 100vh;
    margin: auto;
    background: #f0f0f0;
}
#chat-header {
    background-color: #128c7e;
    color: white;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    flex-wrap: wrap;
}
#chat-header img { width: 40px; height: 40px; border-radius: 50%; }
#chat {
    flex: 1 1 auto;
    padding: 10px;
    overflow-y: auto;
    background: #ece5dd;
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.bubble { padding: 10px 15px; border-radius: 20px; max-width: 75%; word-wrap: break-word; }
.user { background-color: #dcf8c6; align-self: flex-end; }
.bot { background-color: #fff; align-self: flex-start; }
#input-area {
    display: flex;
    padding: 10px;
    background: #f0f0f0;
    flex-shrink: 0;
    position: sticky;
    bottom: 0;
    z-index: 10;
}
#input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; font-size: 16px; }
#send {
    margin-left: 10px;
    padding: 12px;
    border-radius: 50%;
    border: none;
    background-color: #128c7e;
    color: white;
    cursor: pointer;
    min-width: 48px;
    min-height: 48px;
    font-size: 18px;
}
.btn-container { display: flex; flex-direction: column; gap: 10px; margin: 10px 0; }
.btn { padding: 12px 20px; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; font-size: 14px; width: 100%; text-align: center; }
.btn-online { background-color: #43a047; color: white; }
.btn-home { background-color: #0288d1; color: white; }
.qr-bubble { text-align: center; margin: 10px 0; }
.qr-bubble img { max-width: 100%; height: auto; border-radius: 15px; }
</style>
</head>

<body>
<div id="chat-container">
    <div id="chat-header">
        <img src="https://via.placeholder.com/40">
        Sai Clinic - Dr. Vinod (BHMS & Ayurvedic)
    </div>
    <div id="chat"></div>
    <div id="input-area">
        <input id="input" type="text" placeholder="Type a message..." />
        <button id="send">➤</button>
    </div>
</div>

<script>
const chatDiv = document.getElementById("chat");
const input = document.getElementById("input");
const send = document.getElementById("send");

const whatsappDoctorNumber = "8999417947"; // Replace with doctor’s number
const qrAPI = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://wa.me/${whatsappDoctorNumber}`;

let state = "askName";
let patientName = "", patientMobile = "", patientAddress = "", consultationType = "";
let qrBubble = null;

// Scroll helper
function scrollToBottom() {
    setTimeout(() => { chatDiv.scrollTop = chatDiv.scrollHeight + 50; }, 100);
}

// Add message to chat
function addMessage(msg, sender) {
    const bubble = document.createElement("div");
    bubble.classList.add("bubble", sender);
    bubble.innerText = msg;
    chatDiv.appendChild(bubble);
    scrollToBottom();
}

// Add buttons for consultation
function addButtonOptions() {
    const container = document.createElement("div");
    container.className = "btn-container";

    const btnOnline = document.createElement("button");
    btnOnline.className = "btn btn-online";
    btnOnline.innerText = "Online Consultation (₹179)";
    btnOnline.onclick = () => selectConsultation("Online");

    const btnHome = document.createElement("button");
    btnHome.className = "btn btn-home";
    btnHome.innerText = "Clinic Visit";
    btnHome.onclick = () => selectConsultation("Clinic Visit");

    container.appendChild(btnOnline);
    container.appendChild(btnHome);
    chatDiv.appendChild(container);
    scrollToBottom();
}

// Handle consultation selection
function selectConsultation(type) {
    consultationType = type;
    addMessage(type, "user");

    if (type === "Online") {
        qrBubble = document.createElement("div");
        qrBubble.className = "qr-bubble";
        qrBubble.innerHTML = `
            <p>Dear ${patientName}, please scan the QR code & pay ₹179.</p>
            <img src="${qrAPI}">
        `;
        chatDiv.appendChild(qrBubble);
        addMessage("After payment, type 'Paid' to confirm.", "bot");
        scrollToBottom();
        state = "awaitPayment";
    } else {
        addMessage(
            "🏥 Clinic Location: Sai Clinic, Kalewadi, Pune\nTiming: Morning 10:00 AM - 1:00 PM, Evening 6:00 PM - 10:00 PM",
            "bot"
        );
        addMessage(
            "Please bring your previous health documents when visiting the clinic. This will help us provide better care.",
            "bot"
        );
        addMessage(
            `Thank you ${patientName}. Will meet you soon. Take care! (Emergency contact: 7588225403)`,
            "bot"
        );
        state = "done";
        scrollToBottom();
    }
}

// Send button click
send.onclick = () => {
    const msg = input.value.trim();
    if (!msg) return;

    addMessage(msg, "user");
    input.value = "";

    if (state === "askName") {
        patientName = msg;
        state = "askMobile";
        addMessage("Kindly enter your mobile number for contact purposes:", "bot");

    } else if (state === "askMobile") {
        patientMobile = msg;
        state = "askAddress";
        addMessage("Please provide your address:", "bot");

    } else if (state === "askAddress") {
        patientAddress = msg;
        state = "askConsultation";
        addMessage("Select consultation type:", "bot");
        addButtonOptions();

    } else if (state === "awaitPayment") {
        if (msg.toLowerCase() === "paid") {
            if (qrBubble) qrBubble.remove();
            addMessage("✅ Payment received. Processing, please wait 5 minutes...", "bot");

            // Wait 5 minutes (300,000 ms)
            setTimeout(() => {
                // Notify doctor via WhatsApp
                const doctorMessage = `📩 New Patient Alert!
Name: ${patientName}
Mobile: ${patientMobile}
Consultation: ${consultationType}`;
                const doctorWhatsAppURL = `https://wa.me/${whatsappDoctorNumber}?text=${encodeURIComponent(doctorMessage)}`;
                window.open(doctorWhatsAppURL, "_blank"); // Open WhatsApp for doctor

                addMessage("✅ Doctor has been notified.", "bot");

                // Provide patient WhatsApp link
                const patientMessage = `💬 Click here to contact clinic on WhatsApp: https://wa.me/${whatsappDoctorNumber}?text=Hello%20Dr.Vinod,%20I%20have%20completed%20payment.`;
                addMessage(patientMessage, "bot");

                addMessage("Doctor will assist you shortly.", "bot");
                state = "done";
                scrollToBottom();
            }, 10000); // 5 minutes delay
        } else {
            addMessage("Please complete the payment to proceed.", "bot");
        }
    }
};

// Enter key triggers send
input.addEventListener("keypress", e => {
    if (e.key === "Enter") send.click();
});

// On load
window.onload = function() {
    addMessage("Welcome to Sai Clinic 👨‍⚕️", "bot");
    addMessage("May I know your full name, please?", "bot");
};
</script>
</body>
</html>
