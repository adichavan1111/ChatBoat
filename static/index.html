<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sai Clinic - Dr.Vinod(BHMS)</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #d9fdd3;
    margin: 0;
}

/* Responsive Chat Container */
#chat-container {
    width: 100%;
    height: 100vh;
    max-width: 500px;
    margin: auto;
    background: #f0f0f0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Header */
#chat-header {
    background-color: #128c7e;
    color: white;
    padding: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    flex-wrap: wrap;
}

#chat-header img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

/* Chat Area */
#chat {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    background: #ece5dd;
}

/* Message bubbles */
.bubble {
    padding: 10px 15px;
    margin: 5px 0;
    border-radius: 20px;
    max-width: 75%;
    clear: both;
}

.user {
    background-color: #dcf8c6;
    float: right;
}

.bot {
    background-color: #fff;
    float: left;
}

/* Input area */
#input-area {
    display: flex;
    padding: 10px;
    background: #f0f0f0;
}

#input {
    flex: 1;
    padding: 12px;
    border-radius: 20px;
    border: 1px solid #ccc;
    font-size: 16px;
}

#send {
    margin-left: 10px;
    padding: 12px;
    border-radius: 50%;
    border: none;
    background-color: #128c7e;
    color: white;
    cursor: pointer;
}

/* Buttons */
.btn {
    padding: 10px 15px;
    margin: 5px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
}

.btn-online { background-color: #25d366; color: white; }
.btn-home { background-color: #34b7f1; color: white; }

</style>
</head>

<body>

<div id="chat-container">
    <div id="chat-header">
        <img src="https://via.placeholder.com/40">
        Sai Clinic - Dr.Vinod (BHMS & Ayurvedic)
    </div>

    <div id="chat"></div>

    <div id="input-area">
        <input id="input" type="text" placeholder="Type a message..." />
        <button id="send">➤</button>
    </div>
</div>

<script>
const chatDiv = document.getElementById("chat");
const input = document.getElementById("input");
const send = document.getElementById("send");

const whatsappLink = "https://wa.me/919876543210?text=Hello%20Doctor";
const qrAPI = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(whatsappLink)}`;

let state = "askName";
let patientName = "", patientMobile = "", patientAddress = "", consultationType = "";
let qrBubble = null;

function addMessage(msg, sender) {
    const bubble = document.createElement("div");
    bubble.classList.add("bubble", sender);
    bubble.innerText = msg;
    chatDiv.appendChild(bubble);
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

function addButtonOptions() {
    const container = document.createElement("div");

    const btnOnline = document.createElement("button");
    btnOnline.className = "btn btn-online";
    btnOnline.innerText = "Online (₹179)";
    btnOnline.onclick = () => selectConsultation("Online");

    const btnHome = document.createElement("button");
    btnHome.className = "btn btn-home";
    btnHome.innerText = "Clinic Visit";
    btnHome.onclick = () => selectConsultation("Clinic Visit");

    container.appendChild(btnOnline);
    container.appendChild(btnHome);
    chatDiv.appendChild(container);
}

function selectConsultation(type) {
    consultationType = type;
    addMessage(type, "user");

    if (type === "Online") {
        qrBubble = document.createElement("div");
        qrBubble.style.textAlign = "center";
        qrBubble.innerHTML = `
        <p>Scan QR & pay ₹179</p>
        <img src="${qrAPI}" style="width:100%; max-width:250px;">
        `;
        chatDiv.appendChild(qrBubble);

        addMessage("After payment type 'Paid'", "bot");
        state = "awaitPayment";
    } else {
        submitPatientInfo();
    }
}

function submitPatientInfo() {
    addMessage("🏥 Visit: Kalewadi Pune", "bot");
    addMessage(`Thank you ${patientName}`, "bot");
    state = "done";
}

send.onclick = () => {
    const msg = input.value.trim();
    if (!msg) return;

    addMessage(msg, "user");
    input.value = "";

    if (state === "askName") {
        patientName = msg;
        state = "askMobile";
        addMessage("Enter mobile number:", "bot");

    } else if (state === "askMobile") {
        patientMobile = msg;
        state = "askAddress";
        addMessage("Enter address:", "bot");

    } else if (state === "askAddress") {
        patientAddress = msg;
        state = "askConsultation";
        addMessage("Select consultation type:", "bot");
        addButtonOptions();

    } else if (state === "awaitPayment") {
        if (msg.toLowerCase() === "paid") {
            if (qrBubble) qrBubble.remove();
            addMessage("Payment confirmed ✅", "bot");
            state = "done";
        } else {
            addMessage("Please complete payment", "bot");
        }
    }
};

input.addEventListener("keypress", e => {
    if (e.key === "Enter") send.click();
});

window.onload = function() {
    addMessage("Welcome to Sai Clinic 👨‍⚕️", "bot");
    addMessage("Enter your name:", "bot");
};
</script>

</body>
</html>
